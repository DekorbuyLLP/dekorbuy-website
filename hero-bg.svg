<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C2B1A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2D4429;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1C2B1A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bamboo1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3D5C38;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1C2B1A;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Bamboo stalks -->
  <g opacity="0.6">
    <rect x="120" y="0" width="18" height="1080" fill="url(#bamboo1)" rx="9"/>
    <rect x="300" y="0" width="14" height="1080" fill="url(#bamboo1)" rx="7" opacity="0.7"/>
    <rect x="480" y="0" width="20" height="1080" fill="url(#bamboo1)" rx="10"/>
    <rect x="680" y="0" width="12" height="1080" fill="url(#bamboo1)" rx="6" opacity="0.5"/>
    <rect x="850" y="0" width="16" height="1080" fill="url(#bamboo1)" rx="8"/>
    <rect x="1050" y="0" width="22" height="1080" fill="url(#bamboo1)" rx="11" opacity="0.6"/>
    <rect x="1250" y="0" width="14" height="1080" fill="url(#bamboo1)" rx="7"/>
    <rect x="1450" y="0" width="18" height="1080" fill="url(#bamboo1)" rx="9" opacity="0.8"/>
    <rect x="1650" y="0" width="12" height="1080" fill="url(#bamboo1)" rx="6" opacity="0.5"/>
    <rect x="1820" y="0" width="20" height="1080" fill="url(#bamboo1)" rx="10"/>
  </g>

  <!-- Bamboo nodes -->
  <g fill="#3D5C38" opacity="0.5">
    <rect x="112" y="180" width="34" height="6" rx="3"/>
    <rect x="112" y="380" width="34" height="6" rx="3"/>
    <rect x="112" y="580" width="34" height="6" rx="3"/>
    <rect x="112" y="780" width="34" height="6" rx="3"/>
    <rect x="292" y="240" width="28" height="5" rx="2"/>
    <rect x="292" y="440" width="28" height="5" rx="2"/>
    <rect x="292" y="640" width="28" height="5" rx="2"/>
    <rect x="292" y="840" width="28" height="5" rx="2"/>
    <rect x="472" y="160" width="36" height="6" rx="3"/>
    <rect x="472" y="360" width="36" height="6" rx="3"/>
    <rect x="472" y="560" width="36" height="6" rx="3"/>
    <rect x="472" y="760" width="36" height="6" rx="3"/>
    <rect x="472" y="960" width="36" height="6" rx="3"/>
  </g>

  <!-- Warm light glow -->
  <ellipse cx="960" cy="540" rx="600" ry="400" fill="#B8895A" opacity="0.06"/>
  <ellipse cx="200" cy="200" rx="300" ry="200" fill="#3D5C38" opacity="0.15"/>

  <!-- Center text area (lighter zone) -->
  <rect x="0" y="600" width="1920" height="480" fill="#1C2B1A" opacity="0.5"/>

  <!-- Decorative cane weave pattern (subtle) -->
  <g stroke="#B8895A" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="100" x2="1920" y2="100"/>
    <line x1="0" y1="200" x2="1920" y2="200"/>
    <line x1="0" y1="300" x2="1920" y2="300"/>
    <line x1="0" y1="400" x2="1920" y2="400"/>
    <line x1="0" y1="500" x2="1920" y2="500"/>
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="700" x2="1920" y2="700"/>
    <line x1="0" y1="800" x2="1920" y2="800"/>
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="0" y1="1000" x2="1920" y2="1000"/>
  </g>
</svg>
